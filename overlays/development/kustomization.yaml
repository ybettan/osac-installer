apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: osac-devel

# This applies a name prefix to cluster-scoped resources (ClusterRoles,
# ClusterRoleBindings) but does not modify namespaced resources.
transformers:
- prefixTransformer.yaml

labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/managed-by: kustomize
    environment: development

resources:
- ../../base
- ./capi-provider-role.yaml

components:
- ../_shared/console-proxy-shared-dev

generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
# This expects to find quay credentials in
# files/quay-pull-secret.json.
- name: quay-pull-secret
  files:
  - .dockerconfigjson=files/quay-pull-secret.json
  type: kubernetes.io/dockerconfigjson

# This expects to find an AAP license manifest
# in files/license.zip.
- name: config-as-code-manifest-ig
  files:
    - license.zip=files/license.zip
  options:
    labels:
      osac.openshift.io/project: osac-aap

- name: config-as-code-ig
  options:
    disableNameSuffixHash: true
  literals:
    - AAP_EE_IMAGE=ghcr.io/osac-project/osac-aap:latest
    - AAP_PROJECT_GIT_URI="https://github.com/osac-project/osac-aap"
    - AAP_PROJECT_GIT_BRANCH=main

- name: cluster-fulfillment-ig
  options:
    labels:
      osac.openshift.io/project: osac-aap

- name: network-fulfillment-ig
  options:
    labels:
      osac.openshift.io/project: osac-aap

- name: bare-metal-fulfillment-ig
  literals:
    - OS_CLOUD=openstack

# Configures the inventory source used for bare metal host discovery.
# Copy files/inventory.yaml.example to files/inventory.yaml and set:
#   name: a display name for this inventory
#   type: the provider type (e.g. openstack)
#   options.openstack.cloud: the cloud name from clouds.yaml to use for host discovery
#   hostClass: the host class identifier
#   networkClass: the network class identifier
# Then update this generator entry to use files/inventory.yaml
- name: osac-inventory-config
  files:
  - files/inventory.yaml.example

# Standard OpenStack clouds.yaml with credentials for the bare metal provider.
# Copy files/clouds.yaml.example to files/clouds.yaml and set:
#   clouds.<name>.auth.auth_url: Keystone endpoint
#   clouds.<name>.auth.project_name, username, password: OpenStack credentials
#   clouds.<name>.region_name: OpenStack region
# Then update this generator entry to use files/clouds.yaml
- name: osac-os-clouds
  files:
    - files/clouds.yaml.example

# Configures the management cloud connection used by the fulfillment service.
# Copy files/management.yaml.example to files/management.yaml and set:
#   name: a display name for this management provider
#   type: the provider type (e.g. openstack)
#   options.openstack.cloud: the cloud name from clouds.yaml to use for management operations
# Then update this generator entry to use files/management.yaml
- name: osac-management-config
  files:
  - files/management.yaml.example

# Base defaults for the cluster-fulfillment-ig ConfigMap.
# scripts/aap-configuration.sh may override these with values
# from files/osac-aap-configuration.env after oc apply -k.
configMapGenerator:
- name: publish-templates-ig
  literals:
    - OSAC_TEMPLATE_COLLECTIONS=osac.templates
    - OSAC_FULFILLMENT_SERVICE_URI=https://fulfillment-internal-api:8001
- name: cluster-fulfillment-ig
  options:
    labels:
      osac.openshift.io/project: osac-aap
  literals:
    - NETWORK_CLASS=esi
    - NETWORK_STEPS_COLLECTION=osac.steps
    - EXTERNAL_ACCESS_BASE_DOMAIN=box.massopen.cloud
    - EXTERNAL_ACCESS_SUPPORTED_BASE_DOMAINS=box.massopen.cloud
    - EXTERNAL_ACCESS_API_INTERNAL_NETWORK=hypershift
    - HOSTED_CLUSTER_BASE_DOMAIN=box.massopen.cloud
    - HOSTED_CLUSTER_CONTROLLER_AVAILABILITY_POLICY=HighlyAvailable
    - HOSTED_CLUSTER_INFRASTRUCTURE_AVAILABILITY_POLICY=HighlyAvailable
- name: network-fulfillment-ig
  options:
    labels:
      osac.openshift.io/project: osac-aap
  literals:
    - NETRIS_CONTROLLER_URL=https://redhat-ctl.netris.io
    - NETRIS_USERNAME=netris
    - NETRIS_SITE_ID=5
    - NETRIS_TENANT_ID=1
    - NETRIS_TENANT_NAME=Admin
# Configures bare metal host provisioning profiles.
# Copy files/profile.yaml.example to files/profile.yaml and define one entry per profile:
#   name: unique profile identifier
#   hostSelector: label selectors to match eligible bare metal hosts (e.g. managedBy, provisionState)
#   labels: labels applied to the host while this profile is active
#   persistentLabels: labels that remain on the host after the profile completes
#   hostTemplate: AAP job template to run for host-level provisioning
#   bareMetalPoolTemplate: AAP job template for pool-level operations (optional)
#   expectedTemplateParameters: list of required input parameters for the host template (optional)
# Then update this generator entry to use files/profile.yaml
- name: osac-profiles
  files:
    - files/profile.yaml.example

images:
  - name: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
    newName: quay.io/openshift/origin-cli
    newTag: "4.20.0"

patches:
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: fulfillment-controller
      spec:
        template:
          spec:
            containers:
              - name: controller
                imagePullPolicy: Always
  - target:
      kind: Deployment
      name: fulfillment-controller
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/command/7
        value: "--auth-issuer-url=https://keycloak.keycloak.svc.cluster.local/realms/osac"
      - op: replace
        path: /spec/template/spec/containers/0/command/11
        value: "--idp-url=https://keycloak.keycloak.svc.cluster.local"
  - target:
      kind: Deployment
      name: osac-operator-controller-manager
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_AAP_TEMPLATE_PREFIX
          value: osac
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_AAP_URL
          value: "https://osac-aap.osac-devel.apps.<cluster-name>.<base-domain>/api/controller"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_AAP_TOKEN
          valueFrom:
            secretKeyRef:
              name: osac-aap-api-token
              key: token
              optional: true
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_AAP_INSECURE_SKIP_VERIFY
          value: "true"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_AAP_STATUS_POLL_INTERVAL
          value: "30s"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_FULFILLMENT_SERVER_ADDRESS
          value: fulfillment-internal-api:8001
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_FULFILLMENT_TOKEN_FILE
          value: /var/run/secrets/kubernetes.io/serviceaccount/token
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
  - target:
      kind: ClusterRoleBinding
      name: osac-operator-manager-rolebinding
    patch: |-
      - op: replace
        path: /subjects/0/namespace
        value: osac-devel
  - target:
      kind: ClusterRoleBinding
      name: osac-operator-manager-rolebinding
    patch: |-
      - op: replace
        path: /subjects/0/name
        value: osac-operator-controller-manager
  - target:
      kind: ClusterRoleBinding
      name: bmf-operator-manager-rolebinding
    patch: |-
      - op: replace
        path: /subjects/0/namespace
        value: osac-devel
  - target:
      kind: ClusterRoleBinding
      name: bmf-operator-manager-rolebinding
    patch: |-
      - op: replace
        path: /subjects/0/name
        value: bmf-operator-controller-manager
  - target:
      kind: Deployment
      name: bmf-operator-controller-manager
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_AAP_TEMPLATE_PREFIX
          value: osac
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_AAP_URL
          value: "https://osac-aap.osac-devel.apps.<cluster-name>.<base-domain>/api/controller"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_AAP_TOKEN
          valueFrom:
            secretKeyRef:
              name: osac-aap-api-token
              key: token
              optional: true
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_AAP_INSECURE_SKIP_VERIFY
          value: "true"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OS_CLOUD
          valueFrom:
            secretKeyRef:
              name: bare-metal-fulfillment-ig
              key: OS_CLOUD
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: os-clouds
          secret:
            secretName: osac-os-clouds
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
  - patch: |
      apiVersion: operator.authorino.kuadrant.io/v1beta1
      kind: Authorino
      metadata:
        name: authorino
      spec:
        volumes:
          items:
          - name: ca-bundle
            configMaps:
            - ca-bundle
            items:
            - key: bundle.pem
              path: ca-bundle.crt
            mountPath: /etc/pki/tls/certs
  # Override issuerUrl (base has :8001, we use port 443 via service mapping)
  # and admin_subjects for osac-devel namespace
  - patch: |
      apiVersion: authorino.kuadrant.io/v1beta3
      kind: AuthConfig
      metadata:
        name: fulfillment-service
      spec:
        authentication:
          keycloak-jwt:
            jwt:
              issuerUrl: https://keycloak.keycloak.svc.cluster.local/realms/osac
        authorization:
          default:
            opa:
              rego: |
                import rego.v1

                # Emergency service accounts are Kubernetes service accounts that are allowed to act as administrators in case
                # of emergency situations where it isn't possible to get a valid JWT token from the identity provider.
                emergency_service_accounts := {
                  "system:serviceaccount:osac-devel:admin",
                  "system:serviceaccount:osac-devel:template-publisher",
                  "system:serviceaccount:osac-devel:osac-operator-controller-manager",
                }

                # Admin service accounts are service accounts that are allowed to act as administrators.
                admin_service_accounts := {
                  "service-account-osac-admin",
                  "service-account-osac-controller",
                }

                # Admin groups are groups that are allowed to act as administrators.
                admin_groups := {
                  "admins",
                }

                # Tenant admin roles - users with these roles can manage users in their tenant
                tenant_admin_roles := {
                  "tenant-admin",
                  "tenant-user-manager",
                }

                # Tenant IdP manager roles - users with these roles can manage IdP config and assign roles
                tenant_idp_manager_roles := {
                  "tenant-admin",
                  "tenant-idp-manager",
                }

                # Get the gRPC method:
                grpc_method := input.context.request.http.path

                # Get the subject name:
                subject_name = input.auth.identity.user.username if {
                  input.auth.identity.authnMethod == "serviceaccount"
                }
                subject_name = input.auth.identity.username if {
                  input.auth.identity.authnMethod == "jwt"
                }

                # Get the subject groups:
                subject_groups = input.auth.identity.user.groups if {
                  input.auth.identity.authnMethod == "serviceaccount"
                }
                subject_groups = input.auth.identity.groups if {
                  input.auth.identity.authnMethod == "jwt"
                }

                # Get the subject's tenant(s) from JWT claims or service account namespace
                # For JWT users, this comes from the "organization" scope which is in defaultClientScopes.
                # The organization claim is required for tenant admins and IdP managers.
                # For regular users without organization claim, fall back to groups.
                default subject_tenants = []
                subject_tenants = input.auth.identity.organization if {
                  input.auth.identity.authnMethod == "jwt"
                  input.auth.identity.organization
                }
                subject_tenants = input.auth.identity.organizations if {
                  input.auth.identity.authnMethod == "jwt"
                  input.auth.identity.organizations
                }
                # Fallback to groups for JWT users without organization claim
                subject_tenants = subject_groups if {
                  input.auth.identity.authnMethod == "jwt"
                  not input.auth.identity.organization
                  not input.auth.identity.organizations
                }
                # For service accounts, use groups as tenants
                subject_tenants = subject_groups if {
                  input.auth.identity.authnMethod == "serviceaccount"
                }

                # Get the subject's realm roles from JWT
                default subject_realm_roles = []
                subject_realm_roles = input.auth.identity.realm_access.roles if {
                  input.auth.identity.authnMethod == "jwt"
                  input.auth.identity.realm_access
                  input.auth.identity.realm_access.roles
                }

                # Check if an account is an admin account:
                default is_admin = false
                is_admin if {
                  subject_name in emergency_service_accounts
                }
                is_admin if {
                  subject_name in admin_service_accounts
                }
                is_admin if {
                  some group in subject_groups
                  group in admin_groups
                }

                # Check if an account is a tenant admin (can manage users AND IdP in their tenant):
                default is_tenant_admin = false
                is_tenant_admin if {
                  some role in subject_realm_roles
                  role in tenant_admin_roles
                }

                # Check if an account is a tenant IdP manager (can ONLY manage IdP, NOT users):
                default is_tenant_idp_manager = false
                is_tenant_idp_manager if {
                  some role in subject_realm_roles
                  role in tenant_idp_manager_roles
                }

                # Check if an account is a regular client (no admin, tenant management roles):
                default is_client = false
                is_client if {
                  not is_admin
                  not is_tenant_admin
                  not is_tenant_idp_manager
                }

                # Check if account has client-level permissions (clients, tenant admins, or IdP managers):
                default has_client_permissions = false
                has_client_permissions if {
                  is_client
                }
                has_client_permissions if {
                  is_tenant_admin
                }
                has_client_permissions if {
                  is_tenant_idp_manager
                }

                # Allow metadata, reflection and health to everyone:
                allow if {
                  startswith(grpc_method, "/metadata.")
                }
                allow if {
                  startswith(grpc_method, "/grpc.reflection.")
                }
                allow if {
                  startswith(grpc_method, "/grpc.health.")
                }

                # Allow specific methods to clients (and tenant admins/IdP managers who inherit client permissions):
                allow if {
                  has_client_permissions
                  grpc_method in {
                    "/osac.public.v1.ClusterTemplates/Get",
                    "/osac.public.v1.ClusterTemplates/List",
                    "/osac.public.v1.Clusters/Create",
                    "/osac.public.v1.Clusters/Delete",
                    "/osac.public.v1.Clusters/Get",
                    "/osac.public.v1.Clusters/GetKubeconfig",
                    "/osac.public.v1.Clusters/GetKubeconfigViaHttp",
                    "/osac.public.v1.Clusters/GetPassword",
                    "/osac.public.v1.Clusters/GetPasswordViaHttp",
                    "/osac.public.v1.Clusters/List",
                    "/osac.public.v1.Clusters/Update",
                    "/osac.public.v1.ClusterCatalogItems/Get",
                    "/osac.public.v1.ClusterCatalogItems/List",
                    "/osac.public.v1.ComputeInstanceTemplates/Get",
                    "/osac.public.v1.ComputeInstanceTemplates/List",
                    "/osac.public.v1.ComputeInstances/Create",
                    "/osac.public.v1.ComputeInstances/Delete",
                    "/osac.public.v1.ComputeInstances/Get",
                    "/osac.public.v1.ComputeInstances/List",
                    "/osac.public.v1.ComputeInstances/Update",
                    "/osac.public.v1.ConsoleSessions/Create",
                    "/osac.public.v1.Events/Watch",
                    "/osac.public.v1.HostTypes/Get",
                    "/osac.public.v1.HostTypes/List",
                    "/osac.public.v1.NetworkClasses/Create",
                    "/osac.public.v1.NetworkClasses/Delete",
                    "/osac.public.v1.NetworkClasses/Get",
                    "/osac.public.v1.NetworkClasses/List",
                    "/osac.public.v1.NetworkClasses/Update",
                    "/osac.public.v1.Subnets/Create",
                    "/osac.public.v1.Subnets/Delete",
                    "/osac.public.v1.Subnets/Get",
                    "/osac.public.v1.Subnets/List",
                    "/osac.public.v1.Subnets/Update",
                    "/osac.public.v1.VirtualNetworks/Create",
                    "/osac.public.v1.VirtualNetworks/Delete",
                    "/osac.public.v1.VirtualNetworks/Get",
                    "/osac.public.v1.VirtualNetworks/List",
                    "/osac.public.v1.VirtualNetworks/Update",
                    "/osac.public.v1.SecurityGroups/Create",
                    "/osac.public.v1.SecurityGroups/Delete",
                    "/osac.public.v1.SecurityGroups/Get",
                    "/osac.public.v1.SecurityGroups/List",
                    "/osac.public.v1.SecurityGroups/Update",
                    "/osac.public.v1.PublicIPAttachments/Create",
                    "/osac.public.v1.PublicIPAttachments/Delete",
                    "/osac.public.v1.PublicIPAttachments/Get",
                    "/osac.public.v1.PublicIPAttachments/List",
                    "/osac.public.v1.PublicIPAttachments/Update",
                    "/osac.public.v1.PublicIPPools/Get",
                    "/osac.public.v1.PublicIPPools/List",
                    "/osac.public.v1.PublicIPs/Create",
                    "/osac.public.v1.PublicIPs/Delete",
                    "/osac.public.v1.PublicIPs/Get",
                    "/osac.public.v1.PublicIPs/List",
                    "/osac.public.v1.PublicIPs/Update",
                    "/osac.public.v1.Roles/Get",
                    "/osac.public.v1.Roles/List",
                    "/osac.public.v1.RoleBindings/Get",
                    "/osac.public.v1.RoleBindings/List",
                  }
                }

                # Tenant-scoped user management for tenant admins
                # Note: Tenant admins can manage users. IdP managers cannot (they only manage IdP config).
                # OPA performs method-level authorization (can this user call this method?).
                # The application layer enforces resource-level authorization via the generic server's
                # determineAssignedTenant validation, which ensures users can only assign a tenant they have visibility to.
                allow if {
                  is_tenant_admin
                  grpc_method in {
                    "/osac.public.v1.Users/Create",
                    "/osac.public.v1.Users/Get",
                    "/osac.public.v1.Users/List",
                    "/osac.public.v1.Users/Update",
                    "/osac.public.v1.Users/Delete",
                  }
                }

                # Tenant-scoped IdP management (when APIs are added, e.g., IdentityProviders/*, RoleBindings/*)
                # For now, no IdP management APIs exist, so no rules needed yet
                # TODO: Add allow rules for (is_tenant_admin or is_tenant_idp_manager) when IdP APIs are implemented
                # Both tenant admins (full permissions) and tenant IdP managers (IdP-only) should be allowed

                # Allow everything to admins:
                allow if {
                  is_admin
                }
replacements:
- path: console-proxy-replacements.yaml
