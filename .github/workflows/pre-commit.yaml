name: pre-commit

on:
  pull_request:
    paths-ignore:
      - 'OWNERS'
      - 'LICENSE'
      - '*.md'
      - 'docs/**'

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-python@v6
      with:
        python-version: "3.13"
    - uses: pre-commit/action@v3.0.1
