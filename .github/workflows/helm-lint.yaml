name: Helm Lint

on:
  pull_request:
    paths-ignore:
      - 'OWNERS'
      - 'LICENSE'
      - '*.md'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  helm-lint:
    name: Lint Helm Charts
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
      with:
        submodules: recursive
        persist-credentials: false

    - name: Set up Helm
      uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310  # v5.0.1
      with:
        version: v3.17.0

    - name: Set up chart-testing
      uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f  # v2.8.0

    - name: Build chart dependencies
      run: helm dependency build charts/osac/

    - name: Run chart-testing lint
      run: ct lint --all --config ct.yaml

    - name: Template with CI values
      run: |
        set -euo pipefail
        for f in charts/osac/ci/*-values.yaml; do
          echo "--- helm template with $(basename "$f") ---"
          helm template osac charts/osac/ --values "$f" > /dev/null
        done

    - name: Template with environment values
      run: |
        set -euo pipefail
        for f in values/*/values.yaml; do
          echo "--- helm template with $(dirname "$f" | xargs basename) ---"
          helm template osac charts/osac/ --values "$f" \
            --set service.externalHostname=fulfillment-api.example.com \
            --set service.internalHostname=fulfillment-internal-api.example.com \
            > /dev/null
        done

    - name: Validate values schema
      run: python3 -m json.tool charts/osac/values.schema.json > /dev/null
