# --- Prerequisites ---
certManager:
  enabled: true
trustManager:
  enabled: true
caIssuer:
  enabled: true
keycloak:
  enabled: true
aapOperator:
  enabled: true
lvms:
  enabled: true
metallb:
  enabled: false
cnv:
  enabled: false
mce:
  enabled: false

# --- Operator ---
operator:
  image:
    repository: ghcr.io/osac-project/osac-operator
    tag: sha-6b78d1f
    pullPolicy: Always
  provisioning:
    provider: "aap"
  aap:
    insecureSkipVerify: "true"
    tokenSecret:
      name: osac-aap-api-token
      key: token
  fulfillment:
    serverAddress: "fulfillment-internal-api:8001"
    tokenFile: "/var/run/secrets/kubernetes.io/serviceaccount/token"
  controllers:
    clusterOrder: false
    computeInstance: false
    tenant: true
    networking: true
    storage: true
    bareMetalInstance: true
  hubAccess:
    enabled: true
  tenants:
  - name: shared
  - name: osac-e2e-ci

# --- Fulfillment Service ---
service:
  externalHostname: ""  # Set to fulfillment-api-<namespace>.apps.<cluster>.<domain>
  internalHostname: ""  # Set to fulfillment-internal-api-<namespace>.apps.<cluster>.<domain>
  variant: openshift
  images:
    service: ghcr.io/osac-project/fulfillment-service:sha-2f3f872
    envoy: ghcr.io/osac-project/envoy:v1.33.0
  certs:
    issuerRef:
      kind: ClusterIssuer
      name: default-ca
    caBundle:
      configMap: ca-bundle
  auth:
    issuerUrl: https://keycloak.keycloak.svc.cluster.local/realms/osac
    emergencyServiceAccounts:
    - admin
    - osac-operator
    - osac-operator-controller-manager
    - template-publisher
    controllerCredentials:
    - secret:
        name: fulfillment-controller-credentials
        items:
        - key: client-id
          param: client-id
        - key: client-secret
          param: client-secret
  idp:
    provider: keycloak
    url: https://keycloak.keycloak.svc.cluster.local
    credentials:
    - secret:
        name: fulfillment-controller-credentials
        items:
        - key: client-id
          param: client-id
        - key: client-secret
          param: client-secret
  database:
    connection:
    - secret:
        name: fulfillment-db
        items:
        - key: url
          param: url
    - secret:
        name: postgres-client-cert-service
        items:
        - key: tls.crt
          param: sslcert
        - key: tls.key
          param: sslkey
        - key: ca.crt
          param: sslrootcert
  log:
    level: debug

# --- UI ---
ui:
  enabled: true
  images:
    ui: ghcr.io/osac-project/osac-ui:sha-58fd600
  api:
    fulfillment:
      certs:
        caBundle:
          configMap: ca-bundle
  auth:
    certs:
      caBundle:
        configMap: ca-bundle

# --- AAP ---
aap:
  aap:
    instance:
      enabled: true
      name: "osac-aap"
  bootstrap:
    enabled: true
    image: ghcr.io/osac-project/osac-aap:sha-f5cdc54
    cliImage: quay.io/openshift/origin-cli:4.20.0
    backoffLimit: 15
  configAsCode:
    manifestSecret: "config-as-code-manifest-ig"
    secret: "config-as-code-ig"
    eeImage: "ghcr.io/osac-project/osac-aap:sha-f5cdc54"
    projectGitUri: "https://github.com/osac-project/osac-aap"
    projectGitBranch: "f5cdc549df9c01223cdbaf5037521d770f9dd686"

# --- Validation ---
validation:
  enabled: true

# --- Bare Metal Fulfillment Operator ---
bmf:
  enabled: true
  image:
    repository: ghcr.io/osac-project/bare-metal-fulfillment-operator
    tag: sha-d28b3ca
    pullPolicy: Always
  env:
    aapUrl: "http://osac-aap/api/controller"
    aapInsecureSkipVerify: "true"


# --- CI/dev only ---
# Hub access: registers local cluster as a hub. Only for environments
# where the fulfillment service and hub cluster are the same.
hubAccess:
  enabled: true

# Bundled PostgreSQL: single-pod ephemeral database for testing.
# Uses fsync=off — data is lost on restart. Not for production.
bundledPostgres:
  enabled: true
  database:
    name: service
    user: service
