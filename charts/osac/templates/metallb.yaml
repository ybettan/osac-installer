{{- if .Values.metallb.enabled }}
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: caas-address-pool
  namespace: metallb-system
  labels:
    {{- include "osac.labels" . | nindent 4 }}
spec:
  addresses:
    - {{ .Values.metallb.addressCIDR }}
  autoAssign: true
  avoidBuggyIPs: true
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: caas-l2-advertisement
  namespace: metallb-system
  labels:
    {{- include "osac.labels" . | nindent 4 }}
spec:
  ipAddressPools:
    - caas-address-pool
{{- end }}
