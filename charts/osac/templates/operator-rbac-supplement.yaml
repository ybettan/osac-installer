{{/*
TODO: Remove once the osac-operator Helm subchart includes publicipattachments
in its ClusterRole. The upstream manifests (config/rbac/role.yaml) have it
but the Helm chart (charts/operator/templates/clusterrole.yaml) does not.
*/}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: osac-operator-supplement-{{ .Release.Namespace }}
  labels:
    {{- include "osac.labels" . | nindent 4 }}
rules:
- apiGroups:
  - osac.openshift.io
  resources:
  - publicipattachments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - osac.openshift.io
  resources:
  - publicipattachments/finalizers
  verbs:
  - update
- apiGroups:
  - osac.openshift.io
  resources:
  - publicipattachments/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - osac.openshift.io
  resources:
  - baremetalinstances
  verbs:
  - get
  - list
  - update
  - watch
- apiGroups:
  - osac.openshift.io
  resources:
  - baremetalinstances/finalizers
  verbs:
  - update
- apiGroups:
  - osac.openshift.io
  resources:
  - baremetalinstances/status
  verbs:
  - get
  - patch
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: osac-operator-supplement-{{ .Release.Namespace }}
  labels:
    {{- include "osac.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: osac-operator-supplement-{{ .Release.Namespace }}
subjects:
- kind: ServiceAccount
  name: osac-operator
  namespace: {{ .Release.Namespace }}
